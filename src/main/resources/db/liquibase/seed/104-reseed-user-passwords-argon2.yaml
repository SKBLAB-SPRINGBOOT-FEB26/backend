databaseChangeLog:
  - changeSet:
      id: 104-reseed-user-passwords-argon2
      author: nexus-ledger
      context: dev
      comment: >
        Replace BCrypt seed hashes with Argon2id hashes for password "password123",
        matching the Argon2PasswordEncoder configured in SecurityConfig.
      changes:
        - sql:
            sql: |
              UPDATE users SET passwd_hash = '$argon2id$v=19$m=16384,t=2,p=1$TVWLOLrmopZl93Llcxtw0A$qvNC+4J80kwRBZ/X36Ssx45lNCYpqFMZ1EhA4g21els'
                WHERE id = '11111111-1111-1111-1111-111111111111';
              UPDATE users SET passwd_hash = '$argon2id$v=19$m=16384,t=2,p=1$Z1rZTZw/q/AmDABZZ3lFgw$kNmDoE5LnBUKZOQXrVx/SA+br2kd0cvrMDxACFF2RVw'
                WHERE id = '22222222-2222-2222-2222-222222222222';
              UPDATE users SET passwd_hash = '$argon2id$v=19$m=16384,t=2,p=1$EY0HZiNh2U2At0LcERXBeg$re31TKmrfn+FbxRxibGF0h2IAa3xBH18IsYyehiT/2A'
                WHERE id = '33333333-3333-3333-3333-333333333333';
      rollback:
        - sql:
            sql: |
              UPDATE users SET passwd_hash = '$2a$10$dXJ3SW6G7P50lGmMQgel2uGVolUkDGe/GDya4hLXKDSKNOFISjmGa'
                WHERE id IN (
                  '11111111-1111-1111-1111-111111111111',
                  '22222222-2222-2222-2222-222222222222',
                  '33333333-3333-3333-3333-333333333333'
                );
