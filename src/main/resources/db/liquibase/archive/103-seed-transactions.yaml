databaseChangeLog:
  - changeSet:
      id: 103-seed-transactions
      author: nexus-ledger
      context: dev
      comment: >
        Each transaction has exactly 2 entries: one DEBIT and one CREDIT.
        For DEPOSIT: debit customer account (asset increases), credit system cash.
        For WITHDRAWAL: debit system cash, credit customer account (asset decreases).
        For TRANSFER: debit receiver, credit sender.
      changes:
        - sql:
            sql: |
              -- TX-1: Deposit 50,000 RUB to Ivan's checking
              INSERT INTO transactions (id, reference_number, idempotency_key, transaction_type, status, amount, currency, description, created_at, completed_at)
              VALUES ('tx000001-0000-0000-0000-000000000001', 'REF-2026-000001', 'IDEM-2026-000001',
                      'DEPOSIT', 'COMPLETED', 50000.0000, 'RUB', 'Initial deposit',
                      '2026-03-01 10:00:00+03', '2026-03-01 10:00:01+03');

              INSERT INTO transaction_entries (id, transaction_id, account_id, entry_type, amount, created_at) VALUES
                  ('te000001-0000-0000-0000-000000000001', 'tx000001-0000-0000-0000-000000000001',
                   'a1000001-0000-0000-0000-000000000001', 'DEBIT', 50000.0000, '2026-03-01 10:00:01+03'),
                  ('te000002-0000-0000-0000-000000000002', 'tx000001-0000-0000-0000-000000000001',
                   'a0000001-0000-0000-0000-000000000001', 'CREDIT', 50000.0000, '2026-03-01 10:00:01+03');

              -- TX-2: Transfer 10,000 RUB from Ivan to Maria
              INSERT INTO transactions (id, reference_number, idempotency_key, transaction_type, status, amount, currency, description, created_at, completed_at)
              VALUES ('tx000002-0000-0000-0000-000000000002', 'REF-2026-000002', 'IDEM-2026-000002',
                      'TRANSFER', 'COMPLETED', 10000.0000, 'RUB', 'Transfer to Maria',
                      '2026-03-05 14:30:00+03', '2026-03-05 14:30:01+03');

              INSERT INTO transaction_entries (id, transaction_id, account_id, entry_type, amount, created_at) VALUES
                  ('te000003-0000-0000-0000-000000000003', 'tx000002-0000-0000-0000-000000000002',
                   'a2000001-0000-0000-0000-000000000001', 'DEBIT', 10000.0000, '2026-03-05 14:30:01+03'),
                  ('te000004-0000-0000-0000-000000000004', 'tx000002-0000-0000-0000-000000000002',
                   'a1000001-0000-0000-0000-000000000001', 'CREDIT', 10000.0000, '2026-03-05 14:30:01+03');

              -- TX-3: Withdrawal 5,000 RUB from Maria
              INSERT INTO transactions (id, reference_number, idempotency_key, transaction_type, status, amount, currency, description, created_at, completed_at)
              VALUES ('tx000003-0000-0000-0000-000000000003', 'REF-2026-000003', 'IDEM-2026-000003',
                      'WITHDRAWAL', 'COMPLETED', 5000.0000, 'RUB', 'ATM withdrawal',
                      '2026-03-10 09:15:00+03', '2026-03-10 09:15:02+03');

              INSERT INTO transaction_entries (id, transaction_id, account_id, entry_type, amount, created_at) VALUES
                  ('te000005-0000-0000-0000-000000000005', 'tx000003-0000-0000-0000-000000000003',
                   'a0000001-0000-0000-0000-000000000001', 'DEBIT', 5000.0000, '2026-03-10 09:15:02+03'),
                  ('te000006-0000-0000-0000-000000000006', 'tx000003-0000-0000-0000-000000000003',
                   'a2000001-0000-0000-0000-000000000001', 'CREDIT', 5000.0000, '2026-03-10 09:15:02+03');

              -- TX-4: Wire 1,000 USD from Ivan's savings
              INSERT INTO transactions (id, reference_number, idempotency_key, transaction_type, status, amount, currency, description, created_at, completed_at)
              VALUES ('tx000004-0000-0000-0000-000000000004', 'REF-2026-000004', 'IDEM-2026-000004',
                      'WIRE', 'COMPLETED', 1000.0000, 'USD', 'International wire transfer',
                      '2026-03-15 16:45:00+03', '2026-03-15 16:45:05+03');

              INSERT INTO transaction_entries (id, transaction_id, account_id, entry_type, amount, created_at) VALUES
                  ('te000007-0000-0000-0000-000000000007', 'tx000004-0000-0000-0000-000000000004',
                   'a0000002-0000-0000-0000-000000000002', 'DEBIT', 1000.0000, '2026-03-15 16:45:05+03'),
                  ('te000008-0000-0000-0000-000000000008', 'tx000004-0000-0000-0000-000000000004',
                   'a1000002-0000-0000-0000-000000000002', 'CREDIT', 1000.0000, '2026-03-15 16:45:05+03');

              -- TX-5: Transfer 25,000 RUB from Admin to Ivan
              INSERT INTO transactions (id, reference_number, idempotency_key, transaction_type, status, amount, currency, description, created_at, completed_at)
              VALUES ('tx000005-0000-0000-0000-000000000005', 'REF-2026-000005', 'IDEM-2026-000005',
                      'TRANSFER', 'COMPLETED', 25000.0000, 'RUB', 'Bonus payment',
                      '2026-03-20 11:00:00+03', '2026-03-20 11:00:01+03');

              INSERT INTO transaction_entries (id, transaction_id, account_id, entry_type, amount, created_at) VALUES
                  ('te000009-0000-0000-0000-000000000009', 'tx000005-0000-0000-0000-000000000005',
                   'a1000001-0000-0000-0000-000000000001', 'DEBIT', 25000.0000, '2026-03-20 11:00:01+03'),
                  ('te000010-0000-0000-0000-000000000010', 'tx000005-0000-0000-0000-000000000005',
                   'a0000001-0000-0000-0000-000000000001', 'CREDIT', 25000.0000, '2026-03-20 11:00:01+03');

              -- TX-6: Deposit 500 EUR to Maria's savings (PENDING - not yet completed)
              INSERT INTO transactions (id, reference_number, idempotency_key, transaction_type, status, amount, currency, description, created_at, completed_at)
              VALUES ('tx000006-0000-0000-0000-000000000006', 'REF-2026-000006', 'IDEM-2026-000006',
                      'DEPOSIT', 'PENDING', 500.0000, 'EUR', 'Pending EUR deposit',
                      '2026-03-25 08:30:00+03', NULL);

              INSERT INTO transaction_entries (id, transaction_id, account_id, entry_type, amount, created_at) VALUES
                  ('te000011-0000-0000-0000-000000000011', 'tx000006-0000-0000-0000-000000000006',
                   'a2000002-0000-0000-0000-000000000002', 'DEBIT', 500.0000, '2026-03-25 08:30:00+03'),
                  ('te000012-0000-0000-0000-000000000012', 'tx000006-0000-0000-0000-000000000006',
                   'a0000003-0000-0000-0000-000000000003', 'CREDIT', 500.0000, '2026-03-25 08:30:00+03');

              -- Outbox events for all completed transactions
              INSERT INTO outbox_events (id, aggregate_type, aggregate_id, event_type, payload, published, created_at) VALUES
                  ('ev000001-0000-0000-0000-000000000001', 'Transaction', 'tx000001-0000-0000-0000-000000000001',
                   'TRANSACTION_COMPLETED',
                   '{"transactionId":"tx000001-0000-0000-0000-000000000001","type":"DEPOSIT","amount":50000,"currency":"RUB"}'::jsonb,
                   TRUE, '2026-03-01 10:00:01+03'),

                  ('ev000002-0000-0000-0000-000000000002', 'Transaction', 'tx000002-0000-0000-0000-000000000002',
                   'TRANSACTION_COMPLETED',
                   '{"transactionId":"tx000002-0000-0000-0000-000000000002","type":"TRANSFER","amount":10000,"currency":"RUB"}'::jsonb,
                   TRUE, '2026-03-05 14:30:01+03'),

                  ('ev000003-0000-0000-0000-000000000003', 'Transaction', 'tx000003-0000-0000-0000-000000000003',
                   'TRANSACTION_COMPLETED',
                   '{"transactionId":"tx000003-0000-0000-0000-000000000003","type":"WITHDRAWAL","amount":5000,"currency":"RUB"}'::jsonb,
                   TRUE, '2026-03-10 09:15:02+03'),

                  ('ev000004-0000-0000-0000-000000000004', 'Transaction', 'tx000004-0000-0000-0000-000000000004',
                   'TRANSACTION_COMPLETED',
                   '{"transactionId":"tx000004-0000-0000-0000-000000000004","type":"WIRE","amount":1000,"currency":"USD"}'::jsonb,
                   TRUE, '2026-03-15 16:45:05+03'),

                  ('ev000005-0000-0000-0000-000000000005', 'Transaction', 'tx000005-0000-0000-0000-000000000005',
                   'TRANSACTION_COMPLETED',
                   '{"transactionId":"tx000005-0000-0000-0000-000000000005","type":"TRANSFER","amount":25000,"currency":"RUB"}'::jsonb,
                   TRUE, '2026-03-20 11:00:01+03'),

                  ('ev000006-0000-0000-0000-000000000006', 'Transaction', 'tx000006-0000-0000-0000-000000000006',
                   'TRANSACTION_CREATED',
                   '{"transactionId":"tx000006-0000-0000-0000-000000000006","type":"DEPOSIT","amount":500,"currency":"EUR"}'::jsonb,
                   FALSE, '2026-03-25 08:30:00+03');
      rollback:
        - sql:
            sql: |
              DELETE FROM outbox_events WHERE id IN (
                  'ev000001-0000-0000-0000-000000000001',
                  'ev000002-0000-0000-0000-000000000002',
                  'ev000003-0000-0000-0000-000000000003',
                  'ev000004-0000-0000-0000-000000000004',
                  'ev000005-0000-0000-0000-000000000005',
                  'ev000006-0000-0000-0000-000000000006'
              );
              DELETE FROM transaction_entries WHERE id IN (
                  'te000001-0000-0000-0000-000000000001',
                  'te000002-0000-0000-0000-000000000002',
                  'te000003-0000-0000-0000-000000000003',
                  'te000004-0000-0000-0000-000000000004',
                  'te000005-0000-0000-0000-000000000005',
                  'te000006-0000-0000-0000-000000000006',
                  'te000007-0000-0000-0000-000000000007',
                  'te000008-0000-0000-0000-000000000008',
                  'te000009-0000-0000-0000-000000000009',
                  'te000010-0000-0000-0000-000000000010',
                  'te000011-0000-0000-0000-000000000011',
                  'te000012-0000-0000-0000-000000000012'
              );
              DELETE FROM transactions WHERE id IN (
                  'tx000001-0000-0000-0000-000000000001',
                  'tx000002-0000-0000-0000-000000000002',
                  'tx000003-0000-0000-0000-000000000003',
                  'tx000004-0000-0000-0000-000000000004',
                  'tx000005-0000-0000-0000-000000000005',
                  'tx000006-0000-0000-0000-000000000006'
              );
