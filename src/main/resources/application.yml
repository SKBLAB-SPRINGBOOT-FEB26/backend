#file: noinspection SpringBootApplicationYaml

spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
#      password: ${REDIS_PASS}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexusledger}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      # ddl-auto: validate
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/liquibase/db.changelog-master.yaml
    default-schema: public

logging:
  level:
    org.springframework.security: WARN

jwt:
  expiry: 300
  refresh-expiry: 604800
  private-key-res: classpath:keys/ecdsa-p256-private.pem
  public-key-res: classpath:keys/ecdsa-p256-public.pem