x-common: &common
  ulimits:
    nofile:
      soft: 1048576
      hard: 1048576
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 100m
      max-file: 5

x-env: &env
  env_file: .env

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    hostname: postgres
    <<: [ *common, *logging ]
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend-network
    environment:
      - POSTGRES_DB=${DB_NAME:-nexusledger}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - TZ=UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $${DB_USERNAME:-postgres} -d $${DB_NAME:-postgres}' ]
      interval: 3s
      timeout: 10s
      retries: 3

  redis:
    image: valkey/valkey:9-alpine
    container_name: redis
    hostname: redis
    <<: [ *common, *logging ]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - backend-network
    volumes:
      - valkey-socket:/var/run/valkey
    command: >
      valkey-server
      --save ""
      --appendonly no
      --maxmemory-policy noeviction
      --loglevel warning
      --unixsocket /var/run/valkey/valkey.sock
      --unixsocketperm 777
    healthcheck:
      test: [ 'CMD', 'valkey-cli', '-s', '/var/run/valkey/valkey.sock', 'ping' ]
      interval: 3s
      timeout: 3s
      retries: 3

